<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- LCP Optimizations: Preconnect & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="/images/dashboard-report.webp" />
    
    <title>Vetted Niche</title>
  </head>
  <body class="bg-slate-950">
    <div id="root">
      <!-- App Shell / Pre-rendered Skeleton for Instant FCP on Mobile -->
      <style>
        .initial-loader {
          position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          background-color: #020617; /* Tailwind slate-950 */
          z-index: 9999; font-family: system-ui, sans-serif;
        }
        .spinner {
          width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
          border-radius: 50%; border-top-color: #3b82f6; /* blue-500 */
          animation: spin 1s ease-in-out infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div style="color: #64748b; font-size: 14px; font-weight: 500; letter-spacing: 1px;">LOADING VETTED NICHE...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
